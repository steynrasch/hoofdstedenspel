:root {

  --dr-cream: #f8f5ef;
  --dr-white: #ffffff;

  --dr-gray-light: #e5e7eb;
  --dr-red: #a63d2f;
  --dr-green: #2d7a5f;
  --dr-green-light: #e8f5f0;
  --dr-red-light: #fdf0ed;
}

body { margin: 0; padding: 0; background: var(--dr-cream); }

#app {
  padding: 0;
  max-width: 520px;
  margin: 0 auto;
  font-family: 'Lato', sans-serif;
  min-height: 100vh;
  background: var(--dr-white);
}

/* ─── HEADER ─── */
.dr-header {
  background: var(--dr-navy);
  padding: 1.25rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
}
.dr-logo-text {
  font-family: 'Playfair Display', serif;
  color: var(--dr-gold);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: 1.5px;
}
.dr-logo-pipe {
  color: var(--dr-gold);
  font-weight: 300;
  margin: 0 2px;
}
.dr-logo-sub {
  color: rgba(255,255,255,0.55);
  font-family: 'Lato', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  display: block;
  text-align: center;
  margin-top: 2px;
}

/* ─── PROGRESS ─── */
#progress-bar-wrap {
  height: 4px;
  background: var(--dr-gray-light);
  overflow: hidden;
}
#progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--dr-gold-dark), var(--dr-gold));
  border-radius: 0 2px 2px 0;
  transition: width 0.4s ease;
}
#score-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--dr-gray);
  padding: 0.75rem 1.5rem;
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-bottom: 1px solid var(--dr-gray-light);
}

/* ─── COUNTRY VISUAL ─── */
#country-img-wrap {
  width: 100%;
  height: 200px;
  overflow: hidden;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--dr-navy);
  transition: background 0.4s;
}
#country-flag-emoji {
  font-size: 100px;
  line-height: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
  transition: transform 0.3s;
}
#country-flag-emoji:hover { transform: scale(1.1); }
#country-region-label {
  position: absolute;
  top: 12px;
  left: 16px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  font-weight: 600;
}
#country-flag-img {
  position: absolute;
  bottom: 12px;
  right: 12px;
  height: 28px;
  border-radius: 3px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.2);
}

/* ─── QUESTION CARD ─── */
#question-card {
  padding: 1.5rem;
  text-align: center;
  border-bottom: 1px solid var(--dr-gray-light);
}
#country-label {
  font-size: 11px;
  color: var(--dr-gray);
  margin-bottom: 0.35rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 500;
}
#country-name {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--dr-navy);
  line-height: 1.2;
}
#retry-badge {
  display: none;
  margin-top: 0.5rem;
  font-size: 11px;
  color: var(--dr-gold-dark);
  font-weight: 500;
  letter-spacing: 0.5px;
}

/* ─── INPUT ─── */
#input-area { padding: 1.25rem 1.5rem; }
#input-row { display: flex; gap: 8px; margin-bottom: 0.75rem; }
#answer-input {
  flex: 1;
  font-size: 16px;
  padding: 0 14px;
  height: 48px;
  border-radius: 6px;
  border: 1.5px solid var(--dr-gray-light);
  background: var(--dr-white);
  color: var(--dr-navy);
  outline: none;
  font-family: 'Lato', sans-serif;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#answer-input:focus {
  border-color: var(--dr-gold);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
}
#submit-btn {
  height: 48px;
  padding: 0 24px;
  border-radius: 6px;
  border: none;
  background: var(--dr-navy);
  color: var(--dr-gold);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: background 0.2s;
}
#submit-btn:hover { background: var(--dr-navy-light); }

/* ─── FEEDBACK ─── */
#feedback {
  min-height: 44px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  margin-bottom: 0.5rem;
  padding: 0 12px;
  transition: all 0.2s;
}
.feedback-correct {
  color: var(--dr-green);
  background: var(--dr-green-light);
}
.feedback-wrong {
  color: var(--dr-red);
  background: var(--dr-red-light);
}

#skip-btn {
  background: none;
  border: none;
  color: var(--dr-gray);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  display: block;
  margin: 0 auto;
  padding: 6px 12px;
  letter-spacing: 0.5px;
  transition: color 0.2s;
}
#skip-btn:hover { color: var(--dr-navy); }

/* ─── START SCREEN ─── */
#start-screen {
  text-align: center;
  padding: 3rem 1.5rem 2rem;
}
.start-icon {
  width: 72px;
  height: 72px;
  background: var(--dr-navy);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1.25rem;
  font-size: 32px;
}
#start-screen h2 {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 600;
  color: var(--dr-navy);
  margin-bottom: 0.5rem;
}
#start-screen p {
  font-size: 14px;
  color: var(--dr-gray);
  margin-bottom: 2rem;
  line-height: 1.6;
}
.filter-row {

  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 2rem;

.filter-btn {

  padding: 0 16px;

  border: 1.5px solid var(--dr-gray-light);
  background: var(--dr-white);
  color: var(--dr-gray);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-weight: 500;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.filter-btn.active {
  background: var(--dr-navy);
  color: var(--dr-gold);
  border-color: var(--dr-navy);
}
.filter-btn:hover:not(.active) {
  border-color: var(--dr-navy);
  color: var(--dr-navy);
}
#start-btn {
  height: 50px;
  padding: 0 40px;
  border-radius: 6px;
  border: none;
  background: var(--dr-gold);
  color: var(--dr-navy);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: background 0.2s;
}
#start-btn:hover { background: var(--dr-gold-light); }

#missed-list {

.missed-item:last-child { border-bottom: none; }

  font-weight: 700;

#game-screen { display: none; }

.review-banner {
  background: linear-gradient(135deg, var(--dr-gold), var(--dr-gold-light));

let queue=[], idx=0, score=0, missed=[], selectedRegion="all", feedbackTimeout=null;
let wrongQueue=[]; // wrong answers to re-insert after 3 questions
let wrongSchedule=[]; // {item, insertAfterIdx}
let totalQuestions=0;
let answeredCount=0;
let isReviewRound=false;
let finalMissed=[]; // permanently wrong (never got right)

function normalize(s){
  return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[.\-''`\s]+/g," ").trim();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function getFlagUrl(cc){
  return `https://flagcdn.com/w80/${cc}.png`;
}

// Convert country code to flag emoji
function ccToFlagEmoji(cc){
  const upper = cc.toUpperCase();
  return String.fromCodePoint(...[...upper].map(c => 0x1F1E6 - 65 + c.charCodeAt(0)));
}

const REGION_COLORS = {
  "Europe": "#2a3f5f",
  "Asia": "#3d2f1e",
  "Americas": "#1e3a2a",
  "Africa": "#3f2a1e",
  "Oceania": "#1e2f3f",
};
const REGION_NL = {
  "Europe": "Europa",
  "Asia": "Azië",
  "Americas": "Amerika",
  "Africa": "Afrika",
  "Oceania": "Oceanië",
};

function checkAnswerMatch(input, correctCap){
  const norm = normalize(input);
  const normCorrect = normalize(correctCap);
  if(norm === normCorrect) return true;
  // Check alternatives
  const alts = ALT_ANSWERS[correctCap];
  if(alts){
    for(const alt of alts){
      if(norm === normalize(alt)) return true;
    }
  }
  return false;
}

function startGame(){
  const src = selectedRegion==="all" ? ALL_COUNTRIES : ALL_COUNTRIES.filter(x=>x.r===selectedRegion);
  queue=shuffle([...src]);
  idx=0; score=0; missed=[]; wrongQueue=[]; wrongSchedule=[]; answeredCount=0;
  totalQuestions=queue.length;
  isReviewRound=false;
  finalMissed=[];
  document.getElementById("start-screen").style.display="none";
  document.getElementById("end-screen").style.display="none";
  document.getElementById("game-screen").style.display="block";
  document.getElementById("review-banner").style.display="none";
  showQuestion();
}

function startReviewRound(){
  // Take all finalMissed and do one more round
  if(finalMissed.length===0){ endGame(); return; }
  isReviewRound=true;
  queue=shuffle([...finalMissed]);
  idx=0; wrongQueue=[]; wrongSchedule=[];
  totalQuestions=queue.length;
  answeredCount=0;
  finalMissed=[];
  document.getElementById("review-banner").style.display="block";
  showQuestion();
}

function insertWrongBack(){
  // Check if any wrong items are scheduled to be reinserted
  const toInsert=[];
  wrongSchedule = wrongSchedule.filter(ws=>{
    if(answeredCount >= ws.insertAfterCount){
      toInsert.push(ws.item);
      return false;
    }
    return true;
  });
  // Insert them at current position (or right after current)
  for(const item of toInsert){
    // Insert at a random position from idx+1 to idx+3 (or end)
    const pos = Math.min(idx + 1 + Math.floor(Math.random()*2), queue.length);
    queue.splice(pos, 0, item);
  }
}

function showQuestion(){
  insertWrongBack();
  if(idx>=queue.length){
    if(!isReviewRound){
      // Start review round with permanently missed
      startReviewRound();
    } else {
      // Add remaining finalMissed from review round
      endGame();
    }
    return;
  }
  const q=queue[idx];
  document.getElementById("country-name").textContent=q.c;
  document.getElementById("answer-input").value="";
  document.getElementById("feedback").textContent="";
  document.getElementById("feedback").className="";
  const pct = totalQuestions>0 ? (answeredCount/totalQuestions*100) : 0;
  document.getElementById("progress-bar").style.width=pct+"%";
  document.getElementById("score-text").textContent="Score: "+score;
  document.getElementById("progress-text").textContent=(answeredCount+1)+" / "+totalQuestions;

  // Retry badge
  const retryBadge = document.getElementById("retry-badge");
  if(q._retry){
    retryBadge.style.display="block";
    retryBadge.textContent="↺ Herhaling" + (q._retryCount > 1 ? " ("+q._retryCount+"×)" : "");
  } else {
    retryBadge.style.display="none";
  }

  // Country visual — flag emoji + background color per region
  const wrap = document.getElementById("country-img-wrap");
  wrap.style.background = REGION_COLORS[q.r] || "var(--dr-navy)";
  document.getElementById("country-flag-emoji").textContent = ccToFlagEmoji(q.cc);
  document.getElementById("country-region-label").textContent = REGION_NL[q.r] || q.r;

  // Small flag image
  const flagImg = document.getElementById("country-flag-img");
  flagImg.src = getFlagUrl(q.cc);
  flagImg.onerror = () => { flagImg.style.display = "none"; };
  flagImg.onload = () => { flagImg.style.display = "block"; };

  document.getElementById("answer-input").focus();
}

function checkAnswer(){
  if(idx>=queue.length) return;
  const q=queue[idx];
  const val=document.getElementById("answer-input").value;
  if(!val.trim()) return;
  const correct=checkAnswerMatch(val, q.cap);
  const fb=document.getElementById("feedback");
  if(correct){
    score++;
    fb.textContent="✓ Goed! "+q.cap;
    fb.className="feedback-correct";
  } else {
    fb.textContent="✗ Fout — het was: "+q.cap;
    fb.className="feedback-wrong";
    // Schedule wrong answer to come back after 3 more questions
    const retryItem = {...q, _retry:true, _retryCount:(q._retryCount||0)+1};
    wrongSchedule.push({item:retryItem, insertAfterCount: answeredCount+3});
    if(!q._retry){
      missed.push(q); // only add to missed list on first wrong
    }
    finalMissed.push(q); // track for final review
  }
  answeredCount++;
  idx++;
  if(feedbackTimeout) clearTimeout(feedbackTimeout);
  feedbackTimeout=setTimeout(showQuestion,1200);
}

function skipQuestion(){
  if(idx>=queue.length) return;
  const q=queue[idx];
  const fb=document.getElementById("feedback");
  fb.textContent="Het was: "+q.cap;
  fb.className="feedback-wrong";
  // Schedule to come back
  const retryItem = {...q, _retry:true, _retryCount:(q._retryCount||0)+1};
  wrongSchedule.push({item:retryItem, insertAfterCount: answeredCount+3});
  if(!q._retry){
    missed.push(q);
  }
  finalMissed.push(q);
  answeredCount++;
  idx++;
  if(feedbackTimeout) clearTimeout(feedbackTimeout);
  feedbackTimeout=setTimeout(showQuestion,1200);
}

function endGame(){
  document.getElementById("game-screen").style.display="none";
  document.getElementById("end-screen").style.display="block";
  // Deduplicate missed for display
  const uniqueMissed = [];
  const seen = new Set();
  for(const m of missed){
    if(!seen.has(m.c)){
      seen.add(m.c);
      uniqueMissed.push(m);
    }
  }
  const total = selectedRegion==="all" ? ALL_COUNTRIES.length : ALL_COUNTRIES.filter(x=>x.r===selectedRegion).length;
  const correctCount = total - uniqueMissed.length;
  document.getElementById("end-score").textContent=correctCount+"/"+total;
  const pct=Math.round(correctCount/total*100);
  let emoji=pct>=90?"Uitstekend!":pct>=70?"Goed gedaan!":pct>=50?"Aardig bezig!":"Blijf oefenen!";
  document.getElementById("end-label").textContent=emoji+" Je had "+pct+"% goed.";
  const ml=document.getElementById("missed-list");
  ml.innerHTML=uniqueMissed.length?'<h3>Gemiste hoofdsteden ('+uniqueMissed.length+')</h3>':'<h3>Alle goed! Perfecte score!</h3>';
  uniqueMissed.forEach(m=>{
    const d=document.createElement("div");d.className="missed-item";
    d.innerHTML='<span class="missed-country">'+m.c+'</span><span class="missed-capital">'+m.cap+'</span>';
    ml.appendChild(d);
  });
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");selectedRegion=btn.dataset.region;
  });
});
document.getElementById("start-btn").addEventListener("click",startGame);
document.getElementById("submit-btn").addEventListener("click",checkAnswer);
document.getElementById("skip-btn").addEventListener("click",skipQuestion);
document.getElementById("restart-btn").addEventListener("click",()=>{
  document.getElementById("end-screen").style.display="none";
  document.getElementById("start-screen").style.display="block";
});
document.getElementById("answer-input").addEventListener("keydown",e=>{if(e.key==="Enter")checkAnswer();});
</script>
