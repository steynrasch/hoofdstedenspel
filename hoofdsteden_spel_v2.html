#submit-btn { height: 44px; padding: 0 20px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 15px; cursor: pointer; font-family: var(--font-sans); }

#feedback { min-height: 28px; text-align: center; font-size: 15px; font-weight: 500; margin-bottom: 0.5rem; }

.feedback-wrong { color: #993C1D; }
#skip-btn { background: none; border: none; color: var(--color-text-secondary); font-size: 13px; cursor: pointer; font-family: var(--font-sans); display: block; margin: 0 auto; }

  "Bhutan":"Bhutan","Botswana":"Botswana","Brunei":"Brunei","Burkina Faso":"Burkina Faso","Burundi":"Burundi",
};

let queue=[], idx=0, score=0, missed=[], selectedRegion="all", feedbackTimeout=null, nextImg=null;

function normalize(s){
  return s.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[.\-\s]+/g," ").trim();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function getImgUrl(country){
  const en = EN_NAMES[country] || country;
  return `https://source.unsplash.com/800x400/?${encodeURIComponent(en + " landscape")}`;
}

function preloadNext(){
  if(idx+1 < queue.length){
    nextImg = new Image();
    nextImg.src = getImgUrl(queue[idx+1].c);
  }
}

function startGame(){
  const src = selectedRegion==="all" ? ALL_COUNTRIES : ALL_COUNTRIES.filter(x=>x.r===selectedRegion);
  queue=shuffle([...src]); idx=0; score=0; missed=[];
  document.getElementById("start-screen").style.display="none";
  document.getElementById("end-screen").style.display="none";
  document.getElementById("game-screen").style.display="block";
  showQuestion();
}

function showQuestion(){
  if(idx>=queue.length){endGame();return;}
  const q=queue[idx];
  document.getElementById("country-name").textContent=q.c;
  document.getElementById("answer-input").value="";
  document.getElementById("feedback").textContent="";
  document.getElementById("feedback").className="";
  document.getElementById("progress-bar").style.width=(idx/queue.length*100)+"%";
  document.getElementById("score-text").textContent="Score: "+score;
  document.getElementById("progress-text").textContent=(idx+1)+" / "+queue.length;
  const img=document.getElementById("country-img");
  img.src=getImgUrl(q.c);
  img.alt=q.c;
  document.getElementById("img-credit").textContent="Foto via Unsplash";
  document.getElementById("answer-input").focus();
  preloadNext();
}

function checkAnswer(){
  if(idx>=queue.length) return;
  const q=queue[idx];
  const val=document.getElementById("answer-input").value;
  if(!val.trim()) return;
  const correct=normalize(val)===normalize(q.cap);
  const fb=document.getElementById("feedback");
  if(correct){score++;fb.textContent="Goed! "+q.cap;fb.className="feedback-correct";}
  else{missed.push(q);fb.textContent="Fout — het was: "+q.cap;fb.className="feedback-wrong";}
  idx++;
  if(feedbackTimeout) clearTimeout(feedbackTimeout);
  feedbackTimeout=setTimeout(showQuestion,1100);
}

function skipQuestion(){
  if(idx>=queue.length) return;
  missed.push(queue[idx]);
  const fb=document.getElementById("feedback");
  fb.textContent="Het was: "+queue[idx].cap;fb.className="feedback-wrong";
  idx++;
  if(feedbackTimeout) clearTimeout(feedbackTimeout);
  feedbackTimeout=setTimeout(showQuestion,1100);
}

function endGame(){
  document.getElementById("game-screen").style.display="none";
  document.getElementById("end-screen").style.display="block";
  const total=queue.length;
  document.getElementById("end-score").textContent=score+"/"+total;
  const pct=Math.round(score/total*100);
  let emoji=pct>=90?"Uitstekend!":pct>=70?"Goed gedaan!":pct>=50?"Aardig bezig!":"Blijf oefenen!";
  document.getElementById("end-label").textContent=emoji+" Je had "+pct+"% goed.";
  const ml=document.getElementById("missed-list");
  ml.innerHTML=missed.length?"<h3>Gemiste hoofdsteden ("+missed.length+")</h3>":"<h3>Alle goed!</h3>";
  missed.forEach(m=>{
    const d=document.createElement("div");d.className="missed-item";
    d.innerHTML='<span class="missed-country">'+m.c+'</span><span>'+m.cap+'</span>';
    ml.appendChild(d);
  });
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");selectedRegion=btn.dataset.region;
  });
});
document.getElementById("start-btn").addEventListener("click",startGame);
document.getElementById("submit-btn").addEventListener("click",checkAnswer);
document.getElementById("skip-btn").addEventListener("click",skipQuestion);
document.getElementById("restart-btn").addEventListener("click",()=>{
  document.getElementById("end-screen").style.display="none";
  document.getElementById("start-screen").style.display="block";
});
document.getElementById("answer-input").addEventListener("keydown",e=>{if(e.key==="Enter")checkAnswer();});
</script>
